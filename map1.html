<!-- LAYOUT -->
<div class="layout">

    <div class="sidebar-top">
      <div class="search-wrap">

        <input type="text" id="searchInput" placeholder="Search locations..." oninput="filterCards()"/>
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-type="all" onclick="setFilter('all', this)">
          <span class="dot" style="background:#2e7d32"></span> All
        </button>
        <button class="filter-btn" data-type="hotel" onclick="setFilter('hotel', this)">
          <span class="dot" style="background:#1565c0"></span> Hotels
        </button>
        <button class="filter-btn" data-type="cafe" onclick="setFilter('cafe', this)">
          <span class="dot" style="background:#e65100"></span> Cafes
        </button>
        <button class="filter-btn" data-type="restaurant" onclick="setFilter('restaurant', this)">
          <span class="dot" style="background:#b71c1c"></span> Restaurants
        </button>
        <button class="filter-btn" data-type="petstore" onclick="setFilter('petstore', this)">
          <span class="dot" style="background:#6a1b9a"></span> Petstore
        </button>
        <button class="filter-btn" data-type="vet" onclick="setFilter('vet', this)">
          <span class="dot" style="background:#00695c"></span> Vets
        </button>
        <button class="filter-btn" data-type="park" onclick="setFilter('park', this)">
          <span class="dot" style="background:#33691e"></span> Parks
        </button>
      </div>
    </div>
    <div class="results-count">Found <span id="countDisplay">8</span> locations</div>
    <div class="cards-list" id="cardsList"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Нічого не знайдено</div>
      <div class="empty-text">
        Схоже, тут ще нема pet-friendly місць.<br>
        Спробуй інший запит!
      </div>
      <div class="empty-query" id="emptyQuery"></div>
      <button class="clear-btn" onclick="clearSearch()">Очистити пошук</button>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()" title="Закрити">✕</button>
    <div id="detailImg"></div>
    <div class="detail-panel-body" id="detailBody"></div>
  </div>
</div>

// ── MAP INIT ──
const map = L.map('map', { zoomControl: true }).setView([49.0, 31.0], 6);
fixLayout();
setTimeout(() => { fixLayout(); map.invalidateSize(); }, 100);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

// ── MARKERS ──
const markerLayer = {};

function createMarkerIcon(type) {
  const cfg = typeConfig[type];
  return L.divIcon({
    className: '',
    html: `<div class="map-marker marker-${type}"><i class="ti ${cfg.icon}"></i></div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22]
  });
}

locations.forEach(loc => {
  const cfg = typeConfig[loc.type];
  const marker = L.marker([loc.lat, loc.lng], { icon: createMarkerIcon(loc.type) })
    .addTo(map)
    .bindPopup(`
      <div class="popup-body">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
          <div style="width:22px;height:22px;border-radius:50%;background:${cfg.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="ti ${cfg.icon}" style="font-size:12px;color:${cfg.color};"></i>
          </div>
          <div class="type-badge" style="background:${cfg.bg};color:${cfg.color};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">${cfg.label}</div>
        </div>
        <div class="popup-title">${loc.name}</div>
        <div class="popup-sub">
          <span style="color:#f59e0b;font-weight:600;">★ ${loc.rating}</span>
          <span style="color:#999;margin-left:4px;">· ${loc.address}</span>
        </div>
        <button onclick="openDetail(${loc.id})" style="margin-top:8px;width:100%;padding:5px;background:#E6F1FB;color:#185FA5;border:1px solid #85B7EB;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;">Детальніше →</button>
      </div>
    `, { maxWidth: 240 });

  marker.on('click', () => selectCard(loc.id));
  markerLayer[loc.id] = marker;
});

// ── RENDER CARDS ──
let activeFilter = 'all';
let selectedId = null;

function renderCards() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('cardsList');
  const emptyState = document.getElementById('emptyState');
  const emptyQuery = document.getElementById('emptyQuery');
  list.innerHTML = '';
  let count = 0;

  const filtered = [];
  locations.forEach(loc => {
    const matchType = activeFilter === 'all' || loc.type === activeFilter;
    const matchSearch = loc.name.toLowerCase().includes(query) || loc.address.toLowerCase().includes(query);
    if (matchType && matchSearch) filtered.push(loc);
  });
  filtered.sort((a, b) => b.rating - a.rating);

  filtered.forEach(loc => {
    count++;

    const cfg = typeConfig[loc.type];
    const card = document.createElement('div');
    card.className = 'location-card' + (loc.id === selectedId ? ' selected' : '');
    card.dataset.id = loc.id;
    card.innerHTML = `
      <div class="card-img-wrap">
        <img class="card-img" src="${loc.img}" alt="${loc.name}" loading="lazy"/>
        <div class="card-type-overlay">
          <div class="type-badge" style="background:${cfg.color};color:#fff"><i class="ti ${cfg.icon}" style="font-size:11px;margin-right:3px;"></i>${cfg.label}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-title">${loc.name}</div>
          <div class="card-rating"><span style="color:#f59e0b;">★</span> ${loc.rating}</div>
        </div>
        <div class="card-address">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          ${loc.address}
        </div>
        <div class="card-price">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          ${loc.price}
        </div>
        <div class="card-tags">${loc.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    `;
    card.onclick = () => selectCard(loc.id);
    list.appendChild(card);
  });

  document.getElementById('countDisplay').textContent = count;

  
  if (count === 0) {
    list.style.display = 'none';
    const trimmed = query.trim();
    if (trimmed) {
      emptyQuery.textContent = `«${trimmed}»`;
      emptyQuery.style.display = 'block';
    } else {
      emptyQuery.style.display = 'none';
    }
    emptyState.style.display = 'flex';
  } else {
    list.style.display = '';
    emptyState.style.display = 'none';
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  renderCards();
}


const avatarColors = [
  {bg:'#E1F5EE',text:'#0F6E56'},{bg:'#EEEDFE',text:'#534AB7'},
  {bg:'#FAECE7',text:'#993C1D'},{bg:'#E6F1FB',text:'#185FA5'},
  {bg:'#EAF3DE',text:'#3B6D11'},{bg:'#FAEEDA',text:'#854F0B'}
];

function getInitials(name) {
  return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) || '??';
}

function timeAgo(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return 'щойно';
  if (diff < 3600) return Math.floor(diff/60) + ' хв тому';
  if (diff < 86400) return Math.floor(diff/3600) + ' год тому';
  if (diff < 604800) return Math.floor(diff/86400) + ' дн тому';
  return new Date(ts).toLocaleDateString('uk-UA');
}

let currentDetailId = null;
let pickedStars = 0;

function starsHtml(n, size = 13) {
  let s = '';
  for (let i = 1; i <= 5; i++) {
    s += `<span style="font-size:${size}px;color:${i <= n ? '#f59e0b' : '#ddd'};">★</span>`;
  }
  return s;
}

async function waitForFirebase() {
  if (window._firebaseReady) return true;
  return new Promise(resolve => {
    window.addEventListener('firebaseReady', () => resolve(true), { once: true });
    setTimeout(() => resolve(false), 5000);
  });
}

async function loadReviewsFromFirebase(locationId) {
  const ready = await waitForFirebase();
  if (!ready) { console.warn('Firebase не готовий'); return []; }
  try {
    const q = window._fbQuery(
      window._fbCollection(window._firebaseDb, 'reviews'),
      window._fbWhere('locationId', '==', String(locationId)),
      window._fbOrderBy('ts', 'desc')
    );
    const snap = await window._fbGetDocs(q);
    return snap.docs.map(d => d.data());
  } catch(e) {
    console.error('Firebase load error:', e);
    return [];
  }
}

async function saveReviewToFirebase(locationId, review) {
  const ready = await waitForFirebase();
  if (!ready) throw new Error('Firebase не підключено');
  await window._fbAddDoc(
    window._fbCollection(window._firebaseDb, 'reviews'),
    { ...review, locationId: String(locationId), ts: Date.now() }
  );
}

async function renderReviewsSection(locationId) {
  const listEl = document.getElementById('reviews-list');
  const summaryEl = document.getElementById('rating-summary');
  if (!listEl || !summaryEl) return;

  listEl.innerHTML = '<div style="text-align:center;padding:16px;color:#bbb;font-size:13px;">Завантаження...</div>';

  const reviews = await loadReviewsFromFirebase(locationId);
  const sorted  = [...reviews].sort((a,b) => b.rating - a.rating);

  const counts = [0,0,0,0,0];
  reviews.forEach(r => { if (r.rating>=1&&r.rating<=5) counts[r.rating-1]++; });
  const max = Math.max(...counts, 1);
  const loc = locations.find(l => l.id === locationId);
  const ratingAvg = reviews.length
    ? (reviews.reduce((s,r) => s+r.rating, 0) / reviews.length).toFixed(1)
    : loc.rating;

  const barsHtml = [5,4,3,2,1].map(star => {
    const c = counts[star-1];
    const w = Math.round((c/max)*100);
    return `<div class="rbar-row">
      <span class="rbar-label">${star}</span>
      <div class="rbar-track"><div class="rbar-fill" style="width:${w}%"></div></div>
      <span class="rbar-count">${c}</span>
    </div>`;
  }).join('');

  summaryEl.innerHTML = `
    <div class="detail-rating-row">
      <div class="detail-stars">${starsHtml(Math.round(ratingAvg))}</div>
      <span class="detail-rating-num">${ratingAvg}</span>
      <span class="detail-rating-count">· ${reviews.length} відгуки</span>
    </div>
    <div class="rating-bars">${barsHtml}</div>
  `;

  listEl.innerHTML = sorted.length ? sorted.map(r => {
    const col = avatarColors[Math.abs((r.name||'').charCodeAt(0)||0) % avatarColors.length];
    return `<div class="review-item">
      <div class="review-top">
        <div class="review-avatar" style="background:${col.bg};color:${col.text};">${getInitials(r.name)}</div>
        <span class="review-name">${r.name}</span>
        <span class="review-date">${timeAgo(r.ts)}</span>
      </div>
      <div class="review-stars-row">${starsHtml(r.rating, 12)}</div>
      <div class="review-text">${r.text}</div>
    </div>`;
  }).join('') : `<div class="no-reviews">Ще немає відгуків.<br>Будьте першими!</div>`;
}

function toggleReviewForm() {
  const form = document.getElementById('reviewForm');
  const isVisible = form.classList.contains('visible');
  if (isVisible) {
    form.classList.remove('visible');
  } else {
    pickedStars = 0;
    document.getElementById('reviewName').value = '';
    document.getElementById('reviewText').value = '';
    document.getElementById('formError').classList.remove('show');
    updateStarPicker(0);
    form.classList.add('visible');
    document.getElementById('reviewName').focus();
  }
}

function updateStarPicker(n) {
  pickedStars = n;
  document.querySelectorAll('.star-pick').forEach((el, i) => {
    el.classList.toggle('lit', i < n);
  });
}

function hoverStars(n) {
  document.querySelectorAll('.star-pick').forEach((el, i) => {
    el.classList.toggle('lit', i < (n || pickedStars));
  });
}

async function submitReview() {
  const name = document.getElementById('reviewName').value.trim();
  const text = document.getElementById('reviewText').value.trim();
  const err  = document.getElementById('formError');
  const btn  = document.querySelector('.submit-btn');

  if (!pickedStars) { err.textContent = 'Будь ласка, оберіть оцінку'; err.classList.add('show'); return; }
  if (!name)        { err.textContent = 'Введіть своє імʼя';           err.classList.add('show'); return; }
  if (!text)        { err.textContent = 'Напишіть текст відгуку';       err.classList.add('show'); return; }
  err.classList.remove('show');

  btn.disabled = true;
  btn.textContent = 'Збереження...';

  try {
    await saveReviewToFirebase(currentDetailId, { name, text, rating: pickedStars });
    document.getElementById('reviewForm').classList.remove('visible');
    await renderReviewsSection(currentDetailId);
  } catch(e) {
    err.textContent = 'Помилка збереження. Спробуй ще раз.';
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Опублікувати';
  }
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

function openDetail(id) {
  currentDetailId = id;
  const loc = locations.find(l => l.id === id);
  if (!loc) return;
  const cfg = typeConfig[loc.type];

  const imgEl = document.getElementById('detailImg');
  if (loc.img) {
    imgEl.innerHTML = `<img src="${loc.img}" alt="${loc.name}" class="detail-panel-img" onerror="this.parentElement.innerHTML='<div class=detail-panel-img-placeholder><i class=\\'ti ${cfg.icon}\\' style=\\'font-size:52px;color:${cfg.color};opacity:.4\\'></i></div>'"/>`;
  } else {
    imgEl.innerHTML = `<div class="detail-panel-img-placeholder"><i class="ti ${cfg.icon}" style="font-size:52px;color:${cfg.color};opacity:.4"></i></div>`;
  }

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-badge" style="background:${cfg.bg};color:${cfg.color};">
      <i class="ti ${cfg.icon}" style="font-size:12px;"></i> ${cfg.label}
    </div>
    <div class="detail-name">${loc.name}</div>
    <div class="detail-addr"><i class="ti ti-map-pin" style="font-size:12px;"></i> ${loc.address}</div>
    <div id="rating-summary"></div>
    <div class="detail-tags">${loc.tags.map(t=>`<span class="detail-tag">${t}</span>`).join('')}</div>
    <div class="detail-divider"></div>
    <div class="reviews-header-row">
      <span class="reviews-title">Відгуки</span>
      <button class="write-review-btn" onclick="toggleReviewForm()">
        <i class="ti ti-edit" style="font-size:12px;"></i> Написати
      </button>
    </div>
    <div class="review-form" id="reviewForm">
      <div class="review-form-title">Ваш відгук</div>
      <div class="star-picker" id="starPicker">
        <span class="star-pick" onclick="updateStarPicker(1)" onmouseover="hoverStars(1)" onmouseout="hoverStars(0)">★</span>
        <span class="star-pick" onclick="updateStarPicker(2)" onmouseover="hoverStars(2)" onmouseout="hoverStars(0)">★</span>
        <span class="star-pick" onclick="updateStarPicker(3)" onmouseover="hoverStars(3)" onmouseout="hoverStars(0)">★</span>
        <span class="star-pick" onclick="updateStarPicker(4)" onmouseover="hoverStars(4)" onmouseout="hoverStars(0)">★</span>
        <span class="star-pick" onclick="updateStarPicker(5)" onmouseover="hoverStars(5)" onmouseout="hoverStars(0)">★</span>
      </div>
      <input class="name-input" id="reviewName" type="text" placeholder="Ваше імʼя" maxlength="40"/>
      <textarea class="review-textarea" id="reviewText" placeholder="Розкажіть про своє враження від місця..." maxlength="400"></textarea>
      <div class="form-error" id="formError"></div>
      <div class="form-actions">
        <button class="cancel-btn" onclick="toggleReviewForm()">Скасувати</button>
        <button class="submit-btn" onclick="submitReview()">Опублікувати</button>
      </div>
    </div>
    <div id="reviews-list"></div>
  `;

  document.getElementById('detailPanel').classList.add('open');
  renderReviewsSection(id);
}

function selectCard(id) {
  selectedId = id;
  renderCards();
  const loc = locations.find(l => l.id === id);
  if (loc) {
    map.flyTo([loc.lat, loc.lng], 15, { animate: true, duration: 0.8 });
    markerLayer[id].openPopup();
    const el = document.querySelector(`.location-card[data-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function fitVisibleMarkers(type) {
  const visible = locations.filter(l => type === 'all' || l.type === type);
  if (!visible.length) return;
  const bounds = L.latLngBounds(visible.map(l => [l.lat, l.lng]));
  map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14, animate: true, duration: 0.6 });
}

function setFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => { b.className = 'filter-btn'; });
  if (type === 'all') btn.classList.add('active');
  else btn.classList.add(typeConfig[type].activeClass);
  locations.forEach(loc => {
    const marker = markerLayer[loc.id];
    const visible = type === 'all' || loc.type === type;
    if (visible) map.addLayer(marker);
    else map.removeLayer(marker);
  });
  fitVisibleMarkers(type);
  renderCards();
}

function filterCards() { renderCards(); }

// init
renderCards();
setTimeout(() => fitVisibleMarkers('all'), 200);
</script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
   
    const urlParams = new URLSearchParams(window.location.search);
    const typeFromUrl = urlParams.get('type');

    if (typeFromUrl) {
      
      const targetButton = document.querySelector(`.filter-btn[data-type="${typeFromUrl}"]`);

      if (targetButton) {
        
        setFilter(typeFromUrl, targetButton);
        
        
        targetButton.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  });
</script>
</body>
</html>
